<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Asset</title>
</head>
 <a href="register_asset.html"></a>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body{
        background:fixed;
    }
    header h1{
        margin:0px;
        background-color:#003366;
        color:white;
        padding:20px;
    }
    h2{
        text-align:center;
        margin:0;
        padding:0;
        color:#003366;
    }

    .form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    
}
input,select,textarea{
    padding:10px;
    width:100%;
    border:1px solid #ccc;
    border-radius:5px;
     font-size:15px;
}


textarea{
    resize:none;
}
.container{
    width:85%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}


</style>
<body>
    <header>
        <h1>ASSET MANAGEMENT SYSTEM</h1>
    </header>

    <div class="container">
        <h2>Register form</h2>
        <form>

<div class="form-group">
<label>Asset ID</label>
<input type="text" placeholder="Enter Asset ID">
</div>

<div class="form-group">
<label>Asset Name</label>
<input type="text" placeholder="Enter Asset Name">
</div>

<div class="form-group">
<label>Officer</label>
<input type="text" placeholder="Enter User Name">
</div>

<div class="form-group">
<label>Condition of Asset</label>
<select>
<option>Select Condition</option>
<option>Good</option>
<option>Fair</option>
<option>Damaged</option>
</select>
</div>

<div class="form-group">
<label>Registeration Date</label>
<input type="date">
</div>

    </div>


</body>
</html>
