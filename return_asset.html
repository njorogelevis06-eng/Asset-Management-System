<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Asset</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:85%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#003366;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

textarea{
    resize:none;
}

.signature-box{
    border:2px solid #003366;
    border-radius:8px;
    padding:15px;
    margin-top:20px;
}

canvas{
    width:100%;
    height:180px;
    border:1px dashed #999;
    background:white;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    font-size:15px;
}

.return{
    background:#28a745;
}

.clear{
    background:#dc3545;
}

.back{
    background:#007BFF;
}

</style>
</head>

<body>

<header>
<h1>ASSET MANAGEMENT SYSTEM</h1>
</header>

<div class="container">

<h2>RETURN ASSET</h2>

<form>

<div class="form-group">
<label>Asset ID</label>
<input type="text" placeholder="Enter Asset ID">
</div>

<div class="form-group">
<label>Asset Name</label>
<input type="text" placeholder="Enter Asset Name">
</div>

<div class="form-group">
<label>User Name</label>
<input type="text" placeholder="Enter User Name">
</div>

<div class="form-group">
<label>Return Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Condition of Asset</label>
<select>
<option>Select Condition</option>
<option>Good</option>
<option>Fair</option>
<option>Damaged</option>
</select>
</div>

<div class="form-group">
<label>Remarks</label>
<textarea rows="4" placeholder="Enter Remarks"></textarea>
</div>

<div class="signature-box">

<h3>User Signature</h3>

<canvas id="signature-pad"></canvas>

<br><br>

<button type="button" class="clear" id="clear-signature">
Clear Signature
</button>

</div>

<div class="buttons">

<button type="submit" class="return">
Return Asset
</button>

<button type="button"
class="back"
onclick="window.location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

</form>

</div>



<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script>

const canvas=document.getElementById("signature-pad");

const signaturePad=new SignaturePad(canvas);

function resizeCanvas(){

const ratio=Math.max(window.devicePixelRatio||1,1);

canvas.width=canvas.offsetWidth*ratio;

canvas.height=180*ratio;

canvas.getContext("2d").scale(ratio,ratio);

signaturePad.clear();

}

window.addEventListener("resize",resizeCanvas);

resizeCanvas();

document.getElementById("clear-signature").addEventListener("click",function(){

signaturePad.clear();

});

document.querySelector("form").addEventListener("submit",function(e){

e.preventDefault();

if(signaturePad.isEmpty()){

alert("Please sign before returning the asset.");

return;

}

alert("Asset returned successfully!");

});

</script>

</body>
</html>
