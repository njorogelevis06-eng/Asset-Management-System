<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:28px;
}

.logout{
    background:#dc3545;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:5px;
}

.container{
    width:90%;
    margin:30px auto;
}

.welcome{
    font-size:24px;
    color:#003366;
    margin-bottom:25px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.card h2{
    color:#003366;
    margin-bottom:15px;
}

.card p{
    color:#555;
    margin-bottom:20px;
}

.card a{
    text-decoration:none;
    background:#007BFF;
    color:white;
    padding:10px 20px;
    border-radius:5px;
}

.card a:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<header>
    <h1>ASSET MANAGEMENT SYSTEM</h1>

    <a href="../index.html" class="logout">Logout</a>
</header>

<div class="container">

<div class="welcome">
Welcome, User👋
</div>

<div class="dashboard">

<div class="card">
<h2>Request Asset</h2>
<p>Submit a request for an asset.</p>
<a href="request_asset.html">Open</a>
</div>

<div class="card">
<h2>My Assets</h2>
<p>View all assets assigned to you.</p>
<a href="my_assets.html">Open</a>
</div>

<div class="card">
<h2>Return Asset</h2>
<p>Return an asset issued to you.</p>
<a href="return_asset.html">Open</a>
</div>

<div class="card">
<h2>Request Status</h2>
<p>Check whether your requests are pending or approved.</p>
<a href="request_status.html">Open</a>
</div>

</div>

</div>



</body>
</html>
